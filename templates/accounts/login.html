<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <title>Login — FYP Portal</title>
  <link rel="stylesheet" href="/static/css/style.css"/>
</head>
<body>
<div class="auth-wrapper">
  <div class="auth-card">
    <div class="auth-logo">FYP<span>Portal</span></div>

    {% for message in messages %}
      <div class="alert alert-{{ message.tags }}">{{ message }}</div>
    {% endfor %}

    <form method="post">
      {% csrf_token %}
      <div class="form-group">
        <label for="id_email">Email</label>
        <input type="email" name="email" id="id_email" placeholder="you@university.edu" required/>
      </div>
      <div class="form-group">
        <label for="id_password">Password</label>
        <input type="password" name="password" id="id_password" placeholder="••••••••" required/>
      </div>
      <button type="submit" class="btn btn-primary" style="width:100%;margin-top:8px;">
        Login &amp; Send OTP
      </button>
    </form>
    <div class="auth-footer">
      Don't have an account? <a href="{% url 'accounts:register' %}">Register</a>
    </div>
  </div>
</div>
</body>
</html>
