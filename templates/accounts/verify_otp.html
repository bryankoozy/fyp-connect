<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <title>Verify OTP — FYP Portal</title>
  <link rel="stylesheet" href="/static/css/style.css"/>
</head>
<body>
<div class="auth-wrapper">
  <div class="auth-card">
    <div class="auth-logo">FYP<span>Portal</span></div>
    <p style="text-align:center;color:#6b7280;font-size:0.9rem;margin-bottom:20px;">
      Enter the 6-digit OTP sent to your email.
    </p>

    {% for message in messages %}
      <div class="alert alert-{{ message.tags }}">{{ message }}</div>
    {% endfor %}

    <form method="post">
      {% csrf_token %}
      <div class="form-group">
        <label>OTP Code</label>
        <input type="text" name="code" maxlength="6" placeholder="123456"
               style="font-size:1.5rem;letter-spacing:8px;text-align:center;" autofocus required/>
      </div>
      <button type="submit" class="btn btn-primary" style="width:100%;margin-top:8px;">
        Verify OTP
      </button>
    </form>
    <div class="auth-footer">
      <a href="{% url 'accounts:login' %}">Back to login</a>
    </div>
  </div>
</div>
</body>
</html>
